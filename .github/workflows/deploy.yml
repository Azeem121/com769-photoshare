# Backend deployed manually via VS Code
# Frontend deployed manually via Azure Static Web Apps portal
#
# This workflow runs CI only (lint + tests).
# Live backend: https://photoshareapi-cpechycedwbecjae.francecentral-01.azurewebsites.net

name: CI — Lint & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  BACKEND_PATH: "backend"

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  # Job 1 — Lint & unit-test the backend
  # ───────────────────────────────────────────────────────────────────────────
  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: ${{ env.BACKEND_PATH }}/requirements.txt

      - name: Install dependencies
        run: |
          cd ${{ env.BACKEND_PATH }}
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 pytest

      - name: Lint with flake8
        run: |
          cd ${{ env.BACKEND_PATH }}
          flake8 . \
            --max-line-length=120 \
            --exclude=.venv,__pycache__,tests \
            --ignore=E501,W503 \
            --count

      - name: Run unit tests
        env:
          COSMOS_DB_CONNECTION_STRING: "AccountEndpoint=https://dummy.documents.azure.com;AccountKey=dHVmZg==;"
          COSMOS_DB_DATABASE_NAME: "photoshare"
          BLOB_STORAGE_CONNECTION_STRING: "DefaultEndpointsProtocol=https;AccountName=dummy;AccountKey=dHVmZg==;EndpointSuffix=core.windows.net"
          BLOB_CONTAINER_NAME: "photos"
          CV_ENDPOINT: ""
          CV_KEY: ""
        run: |
          cd ${{ env.BACKEND_PATH }}
          python -m pytest tests/ -v --tb=short

  # ───────────────────────────────────────────────────────────────────────────
  # Job 2 — Validate frontend files exist
  # ───────────────────────────────────────────────────────────────────────────
  validate-frontend:
    name: Validate Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check required frontend files exist
        run: |
          echo "Checking frontend files..."
          test -f frontend/index.html     && echo "✓ index.html"
          test -f frontend/consumer.html  && echo "✓ consumer.html"
          test -f frontend/creator.html   && echo "✓ creator.html"
          test -f frontend/shared/auth.js && echo "✓ shared/auth.js"
          test -f frontend/shared/api.js  && echo "✓ shared/api.js"
          test -f frontend/shared/styles.css && echo "✓ shared/styles.css"
          test -f frontend/staticwebapp.config.json && echo "✓ staticwebapp.config.json"
          echo "All frontend files present."

  # ───────────────────────────────────────────────────────────────────────────
  # Job 3 — Deployment notice (no actual deployment — done manually)
  # ───────────────────────────────────────────────────────────────────────────
  deployment-info:
    name: Deployment Info
    runs-on: ubuntu-latest
    needs: [test-backend, validate-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Deployment is manual
        run: |
          echo "=============================================="
          echo " CI passed. Deployment is done manually."
          echo "=============================================="
          echo ""
          echo " Backend  → VS Code Azure Functions extension"
          echo " Live URL → https://photoshareapi-cpechycedwbecjae.francecentral-01.azurewebsites.net"
          echo ""
          echo " Frontend → Azure Static Web Apps portal"
          echo "=============================================="
