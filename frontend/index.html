<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PhotoShare</title>
  <link rel="stylesheet" href="/shared/styles.css" />
</head>
<body>
  <div class="landing">
    <div class="landing-card">
      <div class="landing-logo">PhotoShare</div>
      <p class="landing-tagline">Discover and share moments that matter.</p>

      <form id="login-form" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" placeholder="e.g. alice or alice@creator"
                 autocomplete="username" required />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Min 4 characters"
                 autocomplete="current-password" required />
        </div>

        <button type="submit" class="btn btn-primary" id="login-btn" style="width:100%">
          Sign In / Register
        </button>

        <p class="error-text" id="login-error"></p>
      </form>

      <p class="login-note">
        New here? Just pick a username and password — your account is created automatically.<br/>
        For creator access, add <strong>@creator</strong> to your username (e.g. <em>john@creator</em>).
      </p>
    </div>
  </div>

  <script src="/shared/auth.js"></script>
  <script src="/shared/api.js"></script>
  <script>
    redirectIfLoggedIn();

    async function handleLogin(e) {
      e.preventDefault();
      const errEl = document.getElementById("login-error");
      const btn   = document.getElementById("login-btn");
      errEl.textContent = "";

      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value;

      if (!username || !password) {
        errEl.textContent = "Please enter a username and password.";
        return;
      }

      btn.disabled = true;
      btn.textContent = "Signing in…";

      try {
        const result = await login(username, password);
        saveSession(result.token, {
          userId:   result.userId,
          username: result.username,
          role:     result.role,
        });
        window.location.href = result.role === "creator" ? "/creator.html" : "/consumer.html";
      } catch (err) {
        errEl.textContent = err.message || "Login failed. Please try again.";
        btn.disabled = false;
        btn.textContent = "Sign In / Register";
      }
    }
  </script>
</body>
</html>
