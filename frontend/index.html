<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PhotoShare</title>
  <link rel="stylesheet" href="/shared/styles.css" />
</head>
<body>
  <div class="landing">
    <div class="landing-card">
      <div class="landing-logo">PhotoShare</div>
      <p class="landing-tagline">Discover and share moments that matter.</p>

      <div class="login-providers">
        <button class="login-provider-btn" onclick="loginWith('github')">
          <!-- GitHub icon (inline SVG) -->
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/>
          </svg>
          Continue with GitHub
        </button>

        <button class="login-provider-btn" onclick="loginWith('aad')">
          <!-- Microsoft icon -->
          <svg width="20" height="20" viewBox="0 0 23 23" fill="none">
            <path fill="#f35325" d="M1 1h10v10H1z"/>
            <path fill="#81bc06" d="M12 1h10v10H12z"/>
            <path fill="#05a6f0" d="M1 12h10v10H1z"/>
            <path fill="#ffba08" d="M12 12h10v10H12z"/>
          </svg>
          Continue with Microsoft
        </button>
      </div>

      <p class="login-note">
        Consumer accounts are created automatically on first login.<br/>
        Creator access is granted by an administrator.
      </p>
    </div>
  </div>

  <script src="/shared/auth.js"></script>
  <script>
    // If already logged in, redirect immediately
    redirectIfLoggedIn();

    function loginWith(provider) {
      window.location.href = `/.auth/login/${provider}?post_login_redirect_uri=/index.html`;
    }
  </script>
</body>
</html>
